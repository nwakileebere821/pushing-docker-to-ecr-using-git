name: Push Docker Image to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: docker build -t nginx-image .

      - name: Tag Docker image
        run: docker tag nginx-image:latest <aws-account-id>.dkr.ecr.<region>.amazonaws.com/nginx-repository:latest

      - name: Push Docker image
        run: docker push <aws-account-id>.dkr.ecr.<region>.amazonaws.com/nginx-repository:latest