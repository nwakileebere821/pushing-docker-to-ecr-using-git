         # mask-password: true

      #- name: Build Docker image
       # run: docker build -t digital .

      #- name: Tag Docker image
       # run: docker tag digital:latest public.ecr.aws/e5d5f6i1/digital:dockerproject

      #- name: Push Docker image
      #  run: docker push public.ecr.aws/e5d5f6i1/digital:dockerproject

  deploy:
  runs-on: ubuntu-latest
  needs: build-and-push

  steps:
    - name: Check SSH key
      run: |
        echo "${{ secrets.SSH_KEY }}" > mykey.pem
        chmod 600 mykey.pem
        cat mykey.pem

    - name: Test SSH connection
      run: |
        ssh -o StrictHostKeyChecking=no -i mykey.pem ubuntu@44.203.47.33 "docker ps -a"

    - name: Deploy Docker to server
      run: |
        ssh -o StrictHostKeyChecking=no -i mykey.pem ubuntu@44.203.47.33 << 'EOF'
          docker pull public.ecr.aws/e5d5f6i1/digital:dockerproject
          docker stop digital || true
          docker rm digital || true
          docker run -d -p 80:80 --name digital public.ecr.aws/e5d5f6i1/digital:dockerproject
        EOF