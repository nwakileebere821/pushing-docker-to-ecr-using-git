name: CI/CD Pipeline - Medplus App

on:
  push:
    branches: [ main ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin public.ecr.aws

      - name: Build, Tag, and Push Docker Image
        run: |
          IMAGE_URI=public.ecr.aws/e5d5f6i1/digital:${{ github.run_number }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

  update_manifest:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Clone Kubernetes Manifest Repo
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          git clone https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/nwakileebere821/kubernetes-manifest.git
          cd kubernetes-manifest/mediplus-yaml

          sed -i "s+image:.*+image: public.ecr.aws/e5d5f6i1/digital:${{ github.run_number }}+g" deployment.yaml

          git config user.email "${GIT_USERNAME}@users.noreply.github.com"
          git config user.name "${GIT_USERNAME}"
          git add .
          git commit -m "Update image"
          git push

  deploy_to_eks:
    runs-on: ubuntu-latest
    needs: update_manifest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Apply Kubernetes Manifest
        run: |
          kubectl apply -f https://raw.githubusercontent.com/nwakileebere821/kubernetes-manifest/main/mediplus-yaml/deployment.yaml
