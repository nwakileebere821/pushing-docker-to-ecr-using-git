name: CI/CD Pipeline - Medplus App

on:
  push:
    branches: [ main ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        run: |
          IMAGE_URI=${{ secrets.REGISTRY_NAME }}/mediplus:${{ github.run_number }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

  update_manifest:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Clone Kubernetes Manifest Repo
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          git clone https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/YOUR_USERNAME/kubernetes-manifest.git
          cd kubernetes-manifest/mediplus-yaml

          sed -i "s+image:.*+image: ${{ secrets.REGISTRY_NAME }}/mediplus:${{ github.run_number }}+g" deployment.yaml

  deploy_to_eks:
    runs-on: ubuntu-latest
    needs: update_manifest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Apply Kubernetes Manifest
        run: |
          kubectl apply -f https://raw.githubusercontent.com/YOUR_USERNAME/kubernetes-manifest/main/mediplus-yaml/deployment.yaml

  sync_argocd:
    runs-on: ubuntu-latest
    needs: deploy_to_eks

    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure

      - name: Sync ArgoCD App
        run: |
          argocd app sync mediplus-app
